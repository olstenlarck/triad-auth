name = "triad-auth-broker"
main = "src/index.ts"
compatibility_date = "2026-07-09"

[[d1_databases]]
binding = "DB"
database_name = "triad-auth"
database_id = "96cf3b9f-ab29-4e04-ac26-9e71a2fd3f2f"
migrations_dir = "migrations"

[vars]
ISSUER = "https://triad.wgw.lol"

[env.local.vars]
ISSUER = "http://localhost:4321"

[[env.local.d1_databases]]
binding = "DB"
database_name = "triad-auth"
database_id = "96cf3b9f-ab29-4e04-ac26-9e71a2fd3f2f"
migrations_dir = "migrations"

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
run_worker_first = true

# Add required secrets with `wrangler secret put NAME`:
# SIGNING_PRIVATE_JWK, PAIRWISE_SECRET
# Add at least one complete provider credential pair:
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
# GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
# TWITTER_CLIENT_ID, TWITTER_CLIENT_SECRET

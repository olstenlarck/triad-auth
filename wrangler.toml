name = "triad-auth-broker"
main = "src/index.ts"
compatibility_date = "2026-07-09"

[[d1_databases]]
binding = "DB"
database_name = "triad-auth"
migrations_dir = "migrations"
# Task 10 adds the real database_id returned by `wrangler d1 create`.

[vars]
ISSUER = "http://localhost:8787"

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
run_worker_first = true

# Add secrets with `wrangler secret put NAME`:
# GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET, SIGNING_PRIVATE_JWK, PAIRWISE_SECRET
